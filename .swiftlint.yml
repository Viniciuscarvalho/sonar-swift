# Sonar-Swift — Shared SwiftLint rules
# Pluggable for any iOS 17+/SwiftUI project

excluded:
  - Pods
  - Carthage
  - .build
  - DerivedData
  - vendor
  - "*/Generated"
  - "**/*.generated.swift"
  - Package.swift

# ─── Disabled rules ───
disabled_rules:
  - trailing_comma
  - opening_brace
  - todo

# ─── Opt-in rules ───
opt_in_rules:
  - empty_count
  - empty_string
  - closure_spacing
  - contains_over_filter_count
  - contains_over_first_not_nil
  - discouraged_optional_boolean
  - fatal_error_message
  - first_where
  - force_unwrapping
  - implicitly_unwrapped_optional
  - last_where
  - modifier_order
  - multiline_arguments
  - multiline_parameters
  - overridden_super_call
  - pattern_matching_keywords
  - prefer_self_in_static_references
  - private_action
  - private_outlet
  - redundant_nil_coalescing
  - sorted_first_last
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - vertical_whitespace_closing_braces
  - yoda_condition

# ─── Rule settings ───
line_length:
  warning: 140
  error: 200
  ignores_comments: true
  ignores_urls: true

file_length:
  warning: 500
  error: 1000

type_body_length:
  warning: 300
  error: 500

function_body_length:
  warning: 50
  error: 100

function_parameter_count:
  warning: 6
  error: 8

cyclomatic_complexity:
  warning: 10
  error: 20

nesting:
  type_level: 3
  function_level: 3

identifier_name:
  min_length:
    warning: 2
    error: 1
  max_length:
    warning: 60
    error: 80
  excluded:
    - id
    - x
    - y
    - z
    - i
    - j
    - ok
    - to
    - vm
    - vc
    - db
    - lhs
    - rhs
    - url
    - key

type_name:
  min_length:
    warning: 3
  max_length:
    warning: 50

multiline_arguments:
  only_enforce_after_first_closure_on_first_line: true

modifier_order:
  preferred_modifier_order:
    - acl
    - setterACL
    - override
    - dynamic
    - mutating
    - lazy
    - final
    - required
    - convenience
    - typeMethods
    - owned

reporter: "xcode"
